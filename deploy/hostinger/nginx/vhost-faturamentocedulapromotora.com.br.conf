# Nginx no HOST — HTTPS com Let's Encrypt para o frontend em produção.
# Domínio: faturamentocedulapromotora.com.br
#
# Ordem na VPS:
# 1. Registo DNS tipo A: faturamentocedulapromotora.com.br → IP da VPS
# 2. sudo mkdir -p /var/www/certbot
# 3. Obter certificado (exemplo webroot; ou: sudo certbot --nginx -d faturamentocedulapromotora.com.br):
#    sudo certbot certonly --webroot -w /var/www/certbot -d faturamentocedulapromotora.com.br --email cedulapromotora@gmail.com --agree-tos --non-interactive
# 4. Copiar este ficheiro para sites-available, desativar o vhost só-IP se existir conflito de default_server
# 5. sudo nginx -t && sudo systemctl reload nginx
#
# Os caminhos ssl_certificate abaixo são os padrão do Certbot após o passo 3.
#
# ATENÇÃO: até existirem fullchain.pem e privkey.pem, comente o bloco server { listen 443 ... } abaixo,
# arranque o Nginx, obtenha o certificado (webroot ou certbot certonly --standalone com nginx parado),
# depois descomente o bloco 443.

# HTTP — desafio ACME + redirecionamento para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name faturamentocedulapromotora.com.br;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://faturamentocedulapromotora.com.br$request_uri;
    }
}

# HTTPS — mesmo host serve Next (/) e Django (/integration, /admin, /static)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name faturamentocedulapromotora.com.br;

    ssl_certificate     /etc/letsencrypt/live/faturamentocedulapromotora.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/faturamentocedulapromotora.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 256m;

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /integration/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
