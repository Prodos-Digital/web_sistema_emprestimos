# Nginx no HOST (não dentro do Docker).
# Colocar em /etc/nginx/sites-available/cedula e ativar com symlink em sites-enabled.
#
# Antes: gerar cert (ver scripts/gerar-certificado-selfsigned.sh) e subir backend+frontend
# com docker compose nestas pastas (portas 8005 e 3000 em 127.0.0.1 por defeito).
#
# Ajustar apenas se mudares caminhos SSL ou portas internas.

# HTTP → HTTPS (porta 80 — padrão Hostinger / browsers)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cedula/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/cedula/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 256m;

    # Django (API + admin + estáticos do admin)
    location ^~ /integration/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js (resto)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
